name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore signing keystore from cache
        id: restore-keystore
        uses: actions/cache/restore@v4
        with:
          path: ~/.android/release.keystore
          key: signing-keystore-v1

      - name: Generate signing keystore
        if: steps.restore-keystore.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/release.keystore \
            -alias tping-release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass xmanstudio2024 -keypass xmanstudio2024 \
            -dname "CN=Xman Studio, OU=Dev, O=Xman Studio, L=Bangkok, S=BKK, C=TH"

      - name: Save signing keystore to cache
        if: steps.restore-keystore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.android/release.keystore
          key: signing-keystore-v1

      - name: Read version from build.gradle.kts
        run: |
          VERSION=$(grep 'versionStr' app/build.gradle.kts | head -1 | grep -oP '"\K[^"]+')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -oP '[0-9]+' | tail -1)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_ENV
          echo "📦 Version: v${VERSION} (versionCode: ${VERSION_CODE})"

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        env:
          KEYSTORE_FILE: ${{ runner.home }}/.android/release.keystore
          KEYSTORE_PASSWORD: xmanstudio2024
          KEY_ALIAS: tping-release
          KEY_PASSWORD: xmanstudio2024

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: ${{ runner.home }}/.android/release.keystore
          KEYSTORE_PASSWORD: xmanstudio2024
          KEY_ALIAS: tping-release
          KEY_PASSWORD: xmanstudio2024

      - name: Rename APKs
        run: |
          mkdir -p release-output
          cp app/build/outputs/apk/debug/app-debug.apk release-output/Tping-v${{ env.VERSION }}-debug.apk
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk release-output/Tping-v${{ env.VERSION }}-release.apk
          else
            cp app/build/outputs/apk/release/app-release-unsigned.apk release-output/Tping-v${{ env.VERSION }}-release.apk
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Tping-debug-apk
          path: release-output/Tping-*-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Tping-release-apk
          path: release-output/Tping-*-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: "Tping v${{ env.VERSION }}"
          make_latest: true
          body: |
            ## Tping v${{ env.VERSION }}
            **by Xman Studio**

            Version: `${{ env.VERSION }}` | versionCode: `${{ env.VERSION_CODE }}`

            ### Downloads
            - **Release APK** — ติดตั้งได้เลย (signed) สำหรับใช้งานจริง
            - **Debug APK** — สำหรับทดสอบ/นักพัฒนา

            ### Features
            - บันทึกขั้นตอนการกรอกข้อมูล (Learning Mode)
            - เล่นซ้ำอัตโนมัติ (Auto Playback) พร้อมวนลูป
            - จัดเก็บข้อมูลหลายชุด + หมวดหมู่ + สุ่มข้อมูล
            - แก้ Captcha Puzzle อัตโนมัติ (Visual Feedback Sliding)
            - หน้าต่างลอย Control Center
            - โหมดเกม (กดพิกัดจอ)
            - Export/Import Workflow + Cloud Sync
            - หน้าเลือกแพ็กเกจราคาพร้อมลิงก์ซื้อ License
          draft: false
          prerelease: false
          files: |
            release-output/Tping-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
