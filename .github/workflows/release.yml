name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip auto-bump commits to prevent infinite loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore debug keystore from cache
        id: restore-keystore
        uses: actions/cache/restore@v4
        with:
          path: ~/.android/debug.keystore
          key: debug-keystore-v1

      - name: Generate debug keystore
        if: steps.restore-keystore.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Xman Studio, OU=Dev, O=Xman Studio, L=Bangkok, S=BKK, C=TH"

      - name: Save debug keystore to cache
        if: steps.restore-keystore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.android/debug.keystore
          key: debug-keystore-v1

      - name: Auto-bump version if tag exists
        run: |
          VERSION=$(grep 'versionStr' app/build.gradle.kts | head -1 | grep -oP '"\K[^"]+')
          echo "Current version: $VERSION"

          # Check if tag already exists
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "⚠️ Tag v${VERSION} already exists — auto-bumping patch version"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "🔼 Bumping: ${VERSION} → ${NEW_VERSION}"

            # Update build.gradle.kts
            sed -i "s/val versionStr = \"${VERSION}\"/val versionStr = \"${NEW_VERSION}\"/" app/build.gradle.kts
            VERSION="$NEW_VERSION"

            # Commit and push the version bump
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add app/build.gradle.kts
            git commit -m "v${NEW_VERSION}: auto-bump version [skip ci]"
            git push
          else
            echo "✅ Tag v${VERSION} is new — no bump needed"
          fi

          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -oP '[0-9]+' | tail -1)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_ENV
          echo "📦 Version: v${VERSION} (versionCode: ${VERSION_CODE})"

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Verify APK is signed
        run: |
          echo "=== Checking APK signing ==="
          ls -la app/build/outputs/apk/release/
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "✅ Signed release APK found"
          else
            echo "⚠️ Only unsigned APK found — using it anyway"
          fi

      - name: Rename APK
        run: |
          mkdir -p release-output
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk release-output/Tping-v${{ env.VERSION }}.apk
          else
            cp app/build/outputs/apk/release/app-release-unsigned.apk release-output/Tping-v${{ env.VERSION }}.apk
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tping-apk
          path: release-output/Tping-*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: "Tping v${{ env.VERSION }}"
          make_latest: true
          body: |
            ## Tping v${{ env.VERSION }}
            **by Xman Studio**

            Version: `${{ env.VERSION }}` | versionCode: `${{ env.VERSION_CODE }}`

            ### ดาวน์โหลด
            - **Tping-v${{ env.VERSION }}.apk** — ติดตั้งได้เลย

            ### ฟีเจอร์
            - บันทึกขั้นตอนการกรอกข้อมูล (Learning Mode)
            - เล่นซ้ำอัตโนมัติ (Auto Playback) พร้อมวนลูป
            - จัดเก็บข้อมูลหลายชุด + หมวดหมู่ + สุ่มข้อมูล
            - แก้ Captcha Puzzle อัตโนมัติ (Visual Feedback Sliding)
            - หน้าต่างลอย Control Center
            - โหมดเกม (กดพิกัดจอ)
            - Export/Import Workflow + Cloud Sync
            - หน้าเลือกแพ็กเกจราคาพร้อมลิงก์ซื้อ License
          draft: false
          prerelease: false
          files: |
            release-output/Tping-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
