name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate signing keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Xman Studio, OU=Dev, O=Xman Studio, L=Bangkok, S=BKK, C=TH"

      - name: Set version from release count
        run: |
          # Count existing release tags to get sequential build number
          EXISTING=$(git tag --list 'v*-build.*' | wc -l)
          BUILD_NUM=$((EXISTING + 1))
          BASE_VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -oP '"\K[^"]+')
          echo "VERSION=${BASE_VERSION}" >> $GITHUB_ENV
          echo "BUILD_NUM=${BUILD_NUM}" >> $GITHUB_ENV
          echo "FULL_VERSION=${BASE_VERSION}-build.${BUILD_NUM}" >> $GITHUB_ENV
          echo "📦 Release #${BUILD_NUM} (${BASE_VERSION})"
          # Update versionCode to build number for unique installs
          sed -i "s/versionCode = 1/versionCode = ${BUILD_NUM}/" app/build.gradle.kts

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          mkdir -p release-output
          cp app/build/outputs/apk/debug/app-debug.apk release-output/Tping-v${{ env.VERSION }}-debug.apk
          # Release APK is now signed (not unsigned)
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk release-output/Tping-v${{ env.VERSION }}-release.apk
          else
            cp app/build/outputs/apk/release/app-release-unsigned.apk release-output/Tping-v${{ env.VERSION }}-release.apk
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Tping-debug-apk
          path: release-output/Tping-*-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Tping-release-apk
          path: release-output/Tping-*-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.FULL_VERSION }}
          name: "Tping v${{ env.VERSION }} (Build #${{ env.BUILD_NUM }})"
          body: |
            ## Tping Auto Typing App
            **by Xman Studio**

            Version: `${{ env.VERSION }}` | Build: `#${{ env.BUILD_NUM }}` | versionCode: `${{ env.BUILD_NUM }}`

            ### Downloads
            - **Release APK** - ติดตั้งได้เลย (signed) สำหรับใช้งานจริง
            - **Debug APK** - สำหรับทดสอบ/นักพัฒนา

            ### Features
            - บันทึกขั้นตอนการกรอกข้อมูล (Learning Mode)
            - เล่นซ้ำอัตโนมัติ (Auto Playback) พร้อมวนลูป
            - จัดเก็บข้อมูลหลายชุด + ผูกกับช่องกรอก (Tag Data)
            - หน้าต่างลอย Control Center (บันทึก + เล่น + เลือก Workflow)
            - ระบุตำแหน่ง 3 ชั้น (Resource ID -> Text -> Coordinates)
            - รองรับ: Click, Long Click, Text Input, Scroll, Back
            - Target App Binding + Auto Launch

            ### Install
            1. ดาวน์โหลด Release APK
            2. เปิดไฟล์ติดตั้ง (อนุญาตจากแหล่งที่ไม่รู้จัก)
            3. เปิด Accessibility Service ในตั้งค่า
            4. เปิด Overlay Permission
          draft: false
          prerelease: false
          files: |
            release-output/Tping-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
